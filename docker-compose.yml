services:
  backend:
    build:
      context: ./quint-website-backend
    ports:
      - "8090:8090"
    volumes:
      - pocketbase_data:/pb/pb_data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8090/api/quint/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
  frontend:
    build:
      context: ./quint-website-frontend
      target: development
    environment:
      PUBLIC_API_URL: http://localhost:8090
    ports:
      - "4321:4321"
    volumes:
      - ./quint-website-frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
volumes:
  pocketbase_data:
  frontend_node_modules:
